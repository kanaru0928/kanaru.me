name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment-name:
        description: "Environment name"
        required: false
        default: "prod"
        type: choice
        options:
          - prod
          - dev

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js with cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create GitHub Release
        if: inputs.environment-name == 'prod'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm semantic-release

      - name: Build web app
        run: cd web && pnpm build
        env:
          VITE_BASE_URL: ${{ inputs.environment-name == 'prod' && format('https://{0}', vars.DOMAIN_NAME) || vars.DEV_BASE_URL }}
        
      - name: Prepare Lambda Function Code
        run: pnpm web:deploy

      - name: Compress Lambda Code
        run: cd web/deploy && zip -r9y ../deploy.zip .

      - name: Build API
        run: cd api && pnpm build

      - name: Install Lambda dependencies
        run: cd api && pnpm build:lambda-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - name: Deploy with CDK
        run: cd infrastructure && pnpm cdk deploy AppStack-${{ inputs.environment-name }} --require-approval never
        env:
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          DOMAIN_NAME: ${{ inputs.environment-name == 'prod' && vars.DOMAIN_NAME || '' }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          ENVIRONMENT_NAME: ${{ inputs.environment-name }}
          BUILD_HASH: ${{ github.sha }}

      - name: Deploy Client Resources
        run: cd web/build/client && aws s3 sync --delete . s3://${{ vars.AWS_ACCOUNT_ID }}-kanaru-me-v2-web-assets-${{ inputs.environment-name }}/
